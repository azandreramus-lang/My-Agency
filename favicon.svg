<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <title>Orbit Loop AI Services</title>

  <!-- Translucent background -->
  <rect width="100" height="100" rx="18" fill="#faf9f5" fill-opacity="0.15"/>

  <!-- Orbit ring -->
  <ellipse cx="50" cy="50" rx="34" ry="42" transform="rotate(-18 50 50)" fill="none" stroke="#2e2e2e" stroke-width="1.5"/>
  <ellipse cx="50" cy="50" rx="34" ry="42" transform="rotate(-18 50 50)" fill="none" stroke="#c97a52" stroke-width="2" stroke-dasharray="6 220" stroke-dashoffset="-10"/>

  <!-- Accent dot -->
  <circle cx="77" cy="24" r="5" fill="#c97a52"/>

  <!-- AI label -->
  <text x="50" y="55" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="18" fill="#c97a52">AI</text>

  <!-- Circuit lines top -->
  <line x1="50" y1="43" x2="50" y2="32" stroke="#c97a52" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="32" x2="43" y2="25" stroke="#c97a52" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="32" x2="57" y2="25" stroke="#c97a52" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="43" cy="25" r="2.5" fill="#c97a52"/>
  <circle cx="57" cy="25" r="2.5" fill="#c97a52"/>

  <!-- Circuit lines bottom -->
  <line x1="50" y1="60" x2="50" y2="71" stroke="#c97a52" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="71" x2="43" y2="78" stroke="#c97a52" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="71" x2="57" y2="78" stroke="#c97a52" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="43" cy="78" r="2.5" fill="#c97a52"/>
  <circle cx="57" cy="78" r="2.5" fill="#c97a52"/>

  <!-- Circuit lines left -->
  <line x1="37" y1="51" x2="26" y2="51" stroke="#c97a52" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="51" x2="19" y2="44" stroke="#c97a52" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="51" x2="19" y2="58" stroke="#c97a52" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="19" cy="44" r="2.5" fill="#c97a52"/>
  <circle cx="19" cy="58" r="2.5" fill="#c97a52"/>

  <!-- Circuit lines right -->
  <line x1="63" y1="51" x2="74" y2="51" stroke="#c97a52" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="74" y1="51" x2="81" y2="44" stroke="#c97a52" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="74" y1="51" x2="81" y2="58" stroke="#c97a52" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="81" cy="44" r="2.5" fill="#c97a52"/>
  <circle cx="81" cy="58" r="2.5" fill="#c97a52"/>
</svg>
