<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" fill="none">
  <defs>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c6dfa"/>
      <stop offset="55%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#ff4d9e"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c8c2ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── WAVE MARK ── -->
  <!-- Wave 1 – small swell (left) -->
  <path d="M4,68 Q16,50 28,68"
        stroke="url(#waveGrad)" stroke-width="3" stroke-linecap="round"
        opacity="0.4"/>

  <!-- Wave 2 – medium swell (center) -->
  <path d="M20,68 Q38,36 56,68"
        stroke="url(#waveGrad)" stroke-width="3.5" stroke-linecap="round"
        opacity="0.7"/>

  <!-- Wave 3 – big swell (right, the groundswell) -->
  <path d="M44,68 Q68,10 92,68"
        stroke="url(#waveGrad)" stroke-width="4" stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Baseline -->
  <line x1="0" y1="72" x2="96" y2="72"
        stroke="url(#waveGrad)" stroke-width="1.5" opacity="0.25"/>

  <!-- ── WORDMARK ── -->
  <text x="112" y="56"
        font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-weight="800"
        font-size="38"
        letter-spacing="-1.5"
        fill="url(#textGrad)">Groundswell</text>

  <!-- Tagline -->
  <text x="113" y="72"
        font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-weight="500"
        font-size="11"
        letter-spacing="3"
        fill="#7c6dfa"
        opacity="0.9">AI-POWERED GROWTH SYSTEMS</text>
</svg>
